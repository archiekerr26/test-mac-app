name: Release Mac

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release-mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Build & publish desktop app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Unsigned local-style build. Add APPLE_ID / APPLE_TEAM_ID / certs
          # later for signing + notarization.
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm --workspace apps/desktop run publish
